<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>封面工坊 · Cover Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f4f1ec;
  --paper: #ffffff;
  --ink: #14110d;
  --ink-2: #4a4239;
  --ink-3: #8a8079;
  --line: rgba(20,17,13,0.08);
  --line-2: rgba(20,17,13,0.14);
  --primary: #ff5436;
  --primary-ink: #2b0f06;
  --yolk: #ffd84a;
  --moss: #2e6a3b;
  --ocean: #1e4ed6;
  --r-sm: 6px;
  --r: 10px;
  --r-lg: 16px;
  --f-display: 'Bricolage Grotesque','Noto Serif SC',ui-serif,serif;
  --f-ui: -apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC','Helvetica Neue',system-ui,sans-serif;
  --f-serif: 'Noto Serif SC',ui-serif,serif;
  --f-mono: 'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0; padding: 0;
  font-family: var(--f-ui);
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; }

/* ────── app shell ────── */
.cs-app {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 52px 1fr;
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
}

/* top bar */
.cs-topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
  background: var(--paper);
}
.cs-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.cs-brand .dot {
  width: 24px; height: 24px;
  background: var(--primary);
  border-radius: 7px;
  display: grid; place-items: center;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
}
.cs-divider { width: 1px; height: 18px; background: var(--line); }
.cs-filename {
  font-size: 13px;
  color: var(--ink-2);
  padding: 4px 8px;
  border-radius: 6px;
  background: transparent;
  border: 0;
  outline: 0;
  font-family: inherit;
}
.cs-filename:hover { background: rgba(0,0,0,.04); }
.cs-filename:focus { background: rgba(0,0,0,.04); }
.cs-saved {
  margin-left: 10px;
  color: var(--ink-3);
  font-size: 11px;
}
.cs-spacer { flex: 1; }
.cs-iconbtn {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border: 0; background: transparent;
  border-radius: 8px;
  color: var(--ink-2);
}
.cs-iconbtn:hover { background: rgba(0,0,0,.05); color: var(--ink); }
.cs-iconbtn:disabled { opacity: .35; cursor: not-allowed; }
/* icon + text button — used in topbar for undo/redo/reset */
.cs-textbtn {
  height: 30px;
  padding: 0 10px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border: 0;
  background: transparent;
  border-radius: 8px;
  color: var(--ink-2);
  font-size: 12.5px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.cs-textbtn:hover:not(:disabled) { background: rgba(0,0,0,.05); color: var(--ink); }
.cs-textbtn:disabled { opacity: .35; cursor: not-allowed; }
.cs-avatars { display: flex; }
.cs-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--paper);
  margin-left: -8px;
  background: var(--ink);
  color: #fff;
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
}
.cs-avatars .cs-avatar:first-child { margin-left: 0; }
.cs-btn {
  height: 32px;
  padding: 0 14px;
  display: inline-flex; align-items: center; gap: 6px;
  border: 0;
  background: var(--ink);
  color: #fff;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
}
.cs-btn:hover { background: #000; }
.cs-btn.primary { background: var(--primary); }
.cs-btn.primary:hover { filter: brightness(1.05); }
.cs-btn.ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line);
}
.cs-btn.ghost:hover { background: rgba(0,0,0,.04); }

/* ────── main grid ────── */
.cs-main {
  display: grid;
  /* responsive: side panels shrink down to 240px on narrower laptops */
  grid-template-columns: 56px minmax(240px, 280px) minmax(0, 1fr) minmax(240px, 280px);
  min-height: 0;
  overflow: hidden;
}
/* very narrow viewports (small laptops, half-windowed) */
@media (max-width: 1280px) {
  .cs-main { grid-template-columns: 52px 240px minmax(0, 1fr) 240px; }
}
@media (max-width: 1120px) {
  .cs-main { grid-template-columns: 48px 220px minmax(0, 1fr) 220px; }
}

/* rail */
.cs-rail {
  border-right: 1px solid var(--line);
  background: var(--paper);
  padding: 10px 6px;
  display: flex; flex-direction: column;
  gap: 4px;
}
.cs-rail .tool {
  width: 100%; height: 50px;
  border: 0; background: transparent;
  border-radius: 10px;
  color: var(--ink-2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  font-size: 10px;
  position: relative;
}
.cs-rail .tool:hover { background: rgba(0,0,0,.04); color: var(--ink); }
.cs-rail .tool.active { background: rgba(255,84,54,.08); color: var(--primary); }
.cs-rail .tool.active::before {
  content: '';
  position: absolute;
  left: -8px; top: 12px; bottom: 12px;
  width: 3px; background: var(--primary);
  border-radius: 0 2px 2px 0;
}
.cs-rail-spacer { flex: 1; }

/* side panel */
.cs-panel {
  border-right: 1px solid var(--line);
  background: var(--paper);
  display: flex; flex-direction: column;
  min-height: 0;
}
.cs-panel-hd {
  padding: 14px 16px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.cs-panel-hd h3 {
  margin: 0;
  font-family: var(--f-display);
  font-size: 16px;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.cs-panel-body {
  flex: 1; overflow-y: auto;
  padding: 4px 14px 16px;
  scrollbar-width: thin;
}
.cs-panel-body::-webkit-scrollbar { width: 6px; }
.cs-panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 3px; }

/* tag */
.tag {
  display: inline-flex;
  height: 22px;
  padding: 0 8px;
  align-items: center;
  border-radius: 999px;
  background: rgba(0,0,0,.05);
  font-size: 11px;
  color: var(--ink-2);
}
.tag.dot::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--moss);
  margin-right: 6px;
}

/* upload zone */
.upload-zone {
  padding: 18px 14px;
  border: 1.5px dashed var(--primary);
  background: rgba(255,84,54,.04);
  border-radius: 12px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.upload-zone:hover { background: rgba(255,84,54,.08); }
.upload-zone.drag { background: rgba(255,84,54,.12); border-color: #ff3a16; }
.upload-icon {
  width: 36px; height: 36px;
  border-radius: 999px;
  background: var(--primary);
  color: #fff;
  display: grid; place-items: center;
}

/* collage layout */
.layout-row { display: flex; gap: 6px; }
.layout-card {
  flex: 1;
  padding: 10px 8px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid var(--line);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.layout-card:hover { border-color: var(--line-2); }
.layout-card.active {
  border: 1.5px solid var(--primary);
  background: rgba(255,84,54,.06);
}

/* image library grid */
.lib-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.lib-item {
  aspect-ratio: 1/1;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  background: #f0ebe4;
  cursor: pointer;
  transition: transform .12s, border-color .12s;
}
.lib-item:hover {
  border-color: var(--ink-3);
  transform: scale(1.03);
}
.lib-item:active { cursor: grabbing; }
.lib-item.used { border: 1.5px solid var(--primary); }
.lib-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  -webkit-user-drag: none;  /* prevent default browser image-drag — let HTML5 DnD on parent take over */
}
.lib-item.used img { opacity: 1; }
.lib-item:not(.used) img { opacity: .7; transition: opacity .12s; }
.lib-item:not(.used):hover img { opacity: 1; }
.lib-item .badge {
  position: absolute; top: 3px; right: 3px;
  width: 16px; height: 16px;
  background: var(--primary);
  color: #fff;
  border-radius: 999px;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 700;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
}
.lib-item .lib-del {
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px;
  border: 0;
  border-radius: 999px;
  background: rgba(0,0,0,.55);
  color: #fff;
  display: grid; place-items: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s, background .12s;
  backdrop-filter: blur(4px);
  padding: 0;
}
.lib-item:hover .lib-del { opacity: 1; }
.lib-item .lib-del:hover { background: var(--primary); }

/* drop highlight on slots */
.slot.drop-over { background: rgba(255,84,54,0.12) !important; }
.lib-empty {
  aspect-ratio: 1/1;
  border-radius: 6px;
  border: 1px dashed var(--line-2);
  display: grid; place-items: center;
  color: var(--ink-3);
}

/* ────── stage ────── */
.cs-stage {
  background: var(--bg);
  display: flex; flex-direction: column;
  min-height: 0; position: relative;
}
.cs-stage-tb {
  height: 44px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: rgba(244,241,236,.7);
  backdrop-filter: blur(8px);
}
.size-chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px;
  padding: 0 10px;
  border: 1px solid var(--line);
  background: var(--paper);
  border-radius: 999px;
  font-size: 11.5px;
  color: var(--ink-2);
}
.size-chip.active {
  border-color: var(--ink);
  background: var(--ink);
  color: #fff;
}
.size-chip .num { font-family: var(--f-mono); font-size: 10.5px; }

.cs-stage-body {
  flex: 1; overflow: auto;
  display: grid; place-items: center;
  padding: 24px 20px;
}
@media (max-width: 1280px) {
  .cs-stage-body { padding: 16px 12px; }
}

/* canvas frame */
.canvas-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
}
.canvas-readout {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--ink-3);
  margin-bottom: 12px;
}
/* canvas-clip = on-screen footprint (shadow + clipping).
   .canvas-frame inside is sized to REAL banner pixels and CSS-transformed to fit. */
.canvas-clip {
  position: relative;
  overflow: hidden;
  background: #1a1a1a;
  box-shadow:
    0 0 0 1px var(--line),
    0 14px 40px -10px rgba(0,0,0,.18),
    0 2px 6px rgba(0,0,0,.05);
}
.canvas-frame {
  background: #1a1a1a;
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  /* width/height/transform/borderRadius set inline */
}

/* slot styling */
.slot-row {
  position: absolute; inset: 0;
  display: grid;
  gap: 0;
  overflow: hidden;
}
.slot {
  position: relative;
  overflow: hidden;
  background: #2b2622;
}
.slot.empty {
  display: flex; align-items: center; justify-content: center;
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 8px, transparent 8px 16px),
    #2b2622;
  transition: background .15s;
}
.slot.empty:hover {
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.045) 0 8px, transparent 8px 16px),
    #322c27;
}
.slot img {
  position: absolute;
  width: 100%; height: 100%;
  object-fit: cover;
  transform-origin: center;
  user-select: none;
  -webkit-user-drag: none;
}
.slot-drag-handle {
  position: absolute;
  inset: 0;
  cursor: move;
  z-index: 2;
}

.slot-divider {
  position: absolute;
  top: 0; bottom: 0; width: 1px;
  background: rgba(255,255,255,.18);
  pointer-events: none;
  z-index: 3;
}

/* dark overlay */
.overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 5;
}

/* text block */
.text-block {
  position: absolute;
  display: flex; flex-direction: column;
  z-index: 6;
  pointer-events: none;
}
/* Layout A — centered, subtitle below title.  padding + gap come from inline style (state). */
.text-block.center {
  left: 0; right: 0;
  top: 50%;
  transform: translateY(-50%);
  align-items: center;
}
.text-block.center .subtitle-edit { order: 2; width: 100%; text-align: center; }
.text-block.center .title-edit { order: 1; }
.text-block.center .title-edit {
  text-align: center;
  /* width 100% so left/center/right alignment has room to take effect */
  width: 100%;
  max-width: 100%;
  /* fill first line to max width before wrapping (no balance) */
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Layout B — bottom-left, subtitle above title.  bottom/padding/gap come from inline style. */
.text-block.bottom-left {
  left: 0; right: 0;
  align-items: flex-start;
}
.text-block.bottom-left .subtitle-edit {
  order: 1;
  font-size: 20px;
  letter-spacing: .06em;
  opacity: .9;
}
.text-block.bottom-left .title-edit {
  order: 2;
  text-align: left;
  width: 100%;
  max-width: 100%;
  /* single row in this layout — overflow truncates with ellipsis */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.text-block.bottom-left .title-edit:focus {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
}

.title-edit, .subtitle-edit {
  pointer-events: auto;
  outline: none;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,.35);
  cursor: text;
  padding: 4px 10px;
  border-radius: 5px;
  position: relative;
  transition: box-shadow .12s;
}
.title-edit {
  line-height: 1.25;
  letter-spacing: -.005em;
}
/* when focused (editing centered layout), drop the clamp */
.text-block.center .title-edit:focus {
  display: block;
  overflow: visible;
}
.subtitle-edit {
  font-size: 22px;
  letter-spacing: .04em;
  /* color + opacity now set inline from state.subtitleColor / state.subtitleOpacity */
  text-shadow: 0 2px 10px rgba(0,0,0,.35);
}
/* only show edit affordance on hover / focus — keep preview clean
   shadows are in banner-px; previewScale shrinks them visually */
.title-edit:hover, .subtitle-edit:hover {
  box-shadow: 0 0 0 2px rgba(255,255,255,.25);
}
.title-edit:focus, .subtitle-edit:focus {
  box-shadow: 0 0 0 3px var(--primary);
  background: rgba(0,0,0,.15);
}

/* ────── props rail ────── */
.cs-props {
  border-left: 1px solid var(--line);
  background: var(--paper);
  display: flex; flex-direction: column;
  min-height: 0;
}
.cs-props .tabs {
  display: flex;
  padding: 8px 12px;
  gap: 4px;
  border-bottom: 1px solid var(--line);
}
.cs-props .tab {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--ink-3);
  border: 0;
  background: transparent;
}
.cs-props .tab.active {
  background: rgba(0,0,0,.06);
  color: var(--ink);
}

.group {
  display: flex; flex-direction: column;
  gap: 8px;
  padding: 12px 0;
  border-top: 1px solid var(--line);
}
.group:first-child { border-top: 0; padding-top: 12px; }
.group .hd {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-3);
  font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}

/* form fields */
.field {
  width: 100%;
  height: 32px;
  padding: 0 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  background: var(--paper);
  font: inherit;
  color: var(--ink);
  outline: none;
}
.field:focus { border-color: var(--ink); }
.textarea {
  width: 100%;
  min-height: 58px;
  padding: 8px 12px;
  border-radius: var(--r);
  border: 1px solid var(--line);
  background: var(--paper);
  font: inherit;
  color: var(--ink);
  outline: none;
  resize: vertical;
  line-height: 1.5;
}
.textarea:focus { border-color: var(--ink); }

.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }

/* swatch */
.swatch {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1px solid var(--line-2);
  cursor: pointer;
  position: relative;
}
.swatch.active::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 8px;
  border: 2px solid var(--primary);
}
.swatch.light { box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }

/* slider */
.slider-wrap { position: relative; height: 4px; background: rgba(0,0,0,.1); border-radius: 999px; }
.slider-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ink); border-radius: 999px; }
.slider-input {
  position: absolute; left: 0; top: -8px; right: 0;
  width: 100%; height: 20px;
  -webkit-appearance: none; appearance: none;
  background: transparent;
  cursor: pointer;
}
.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--line);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.slider-input::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--line);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}

/* align toggle */
.align-toggle {
  display: flex; gap: 2px;
  padding: 2px;
  background: rgba(0,0,0,.05);
  border-radius: 6px;
}
.align-toggle .opt {
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 11px;
  background: transparent;
  color: var(--ink-3);
  border: 0;
}
.align-toggle .opt.active {
  background: #fff;
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}

/* canvas tabs — multi-cover switcher below the preview */
.canvas-tabs {
  margin-top: 18px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1100px;
}
.canvas-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 30px;
  padding: 0 8px 0 8px;
  border-radius: 999px;
  background: var(--paper);
  border: 1px solid var(--line);
  font-size: 12px;
  color: var(--ink-2);
  cursor: pointer;
  transition: border-color .12s, background .12s;
  max-width: 220px;
}
.canvas-tab:hover { border-color: var(--line-2); }
.canvas-tab.active {
  border: 1.5px solid var(--primary);
  background: rgba(255,84,54,.06);
  color: var(--primary-ink);
}
.canvas-tab-idx {
  width: 16px; height: 16px;
  border-radius: 999px;
  background: rgba(0,0,0,.08);
  color: var(--ink-2);
  font-family: var(--f-mono);
  font-size: 9.5px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.canvas-tab.active .canvas-tab-idx { background: var(--primary); color: #fff; }
.canvas-tab-name {
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.canvas-tab-act {
  width: 18px; height: 18px;
  border: 0; padding: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--ink-3);
  display: grid; place-items: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s, background .12s;
  font-size: 11px;
}
.canvas-tab:hover .canvas-tab-act { opacity: 1; }

  border-radius: 999px;
  border: 0;
  padding: 0;
  cursor: pointer;
  position: relative;
  transition: background .15s;
  flex-shrink: 0;
}
.cs-switch::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,.25);
  transition: left .15s;

.cs-switch.on::after { left: 14px; }

  background: rgba(0,0,0,.06);
  color: var(--ink-2);

  cursor: pointer;
  padding: 0;

  transition: border-color .15s, box-shadow .15s;

  border-color: rgba(255,84,54,.45);

  slotImgs: (overrides.slotImgs || DEFAULT_COVER.slotImgs).slice(),
  bannerSize: { ...(overrides.bannerSize || DEFAULT_COVER.bannerSize) },
  id: overrides.id || ('c-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5)),
});

// Built-in size presets — fixed ids so they can be marked as the default size
const BUILTIN_SIZES = [
  { id: 'bi-banner', name: 'Banner 3.4:1', w: 1200, h: 350 },
  { id: 'bi-169',    name: '16:9',         w: 1920, h: 1080 },
  { id: 'bi-11',     name: '1:1',          w: 1080, h: 1080 },
  { id: 'bi-916',    name: '9:16',         w: 900,  h: 1600 },
];
// Resolve the {w,h} of the chosen default size from a state object
const resolveDefaultSize = (st) => {
  const all = [...BUILTIN_SIZES, ...((st && st.sizePresets) || [])];
  const found = all.find(p => p.id === (st && st.defaultSizeId));
  return found ? { w: found.w, h: found.h } : { w: 1200, h: 350 };
};

const DEFAULT_STATE = {
  covers: [mkCover()],
  activeCoverIdx: 0,
  // shared across covers
  library: [],
  titlePresets: DEFAULT_TITLE_PRESETS.map(p => ({ ...p })),
  templates: DEFAULT_TEMPLATES.map(t => ({ ...t })),
  sizePresets: [],
  defaultSizeId: 'bi-banner',
};

// Migrate old flat state (v5 single-cover layout) into the new covers[] layout
const loadInitial = () => {
  const saved = loadState();
  if (!saved) return DEFAULT_STATE;
  if (Array.isArray(saved.covers) && saved.covers.length > 0) {
    // Already in the new shape — backfill any missing cover fields with defaults
    // Also migrate the OLD default filename ("今日吃瓜 · 周三头条") → 封面N
    const OLD_DEFAULT_FILENAME = '今日吃瓜 · 周三头条';
    const migratedCovers = saved.covers.map((c, i) => {
      const next = mkCover({ ...c });
      if (next.filename === OLD_DEFAULT_FILENAME) {
        next.filename = `封面${i + 1}`;
      }
      return next;
    });
    return {
      library: saved.library || [],
      titlePresets: saved.titlePresets || DEFAULT_TITLE_PRESETS.map(p => ({ ...p })),
      templates: saved.templates || DEFAULT_TEMPLATES.map(t => ({ ...t })),
      sizePresets: saved.sizePresets || [],
      defaultSizeId: saved.defaultSizeId || 'bi-banner',
      activeCoverIdx: Math.min(saved.activeCoverIdx || 0, migratedCovers.length - 1),
      covers: migratedCovers,
    };
  }
  // Old flat shape — wrap into covers[0]
  const cover = mkCover();
  for (const k of COVER_FIELDS) {
    if (saved[k] !== undefined) cover[k] = saved[k];
  }
  if (cover.filename === '今日吃瓜 · 周三头条') cover.filename = '封面1';
  return {
    covers: [cover],
    activeCoverIdx: 0,
    library: saved.library || [],
    titlePresets: saved.titlePresets || DEFAULT_TITLE_PRESETS.map(p => ({ ...p })),
    templates: DEFAULT_TEMPLATES.map(t => ({ ...t })),
    sizePresets: saved.sizePresets || [],
    defaultSizeId: saved.defaultSizeId || 'bi-banner',
  };
};

// ───── undo/redo helpers ─────
// Store history as a single state object so updates stay pure.
const useUndoableState = (initial) => {
  const [hist, setHist] = useState({ past: [], present: initial, future: [] });

  const set = useCallback((updater, opts = {}) => {
    setHist(h => {
      const next = typeof updater === 'function' ? updater(h.present) : updater;
      if (next === h.present) return h;
      if (opts.skipHistory) return { ...h, present: next };
      return {
        past: [...h.past.slice(-29), h.present],
        present: next,
        future: [],
      };
    });
  }, []);

  const undo = useCallback(() => {
    setHist(h => {
      if (h.past.length === 0) return h;
      const prev = h.past[h.past.length - 1];
      return {
        past: h.past.slice(0, -1),
        present: prev,
        future: [h.present, ...h.future],
      };
    });
  }, []);

  const redo = useCallback(() => {
    setHist(h => {
      if (h.future.length === 0) return h;
      const next = h.future[0];
      return {
        past: [...h.past, h.present],
        present: next,
        future: h.future.slice(1),
      };
    });
  }, []);

  return [hist.present, set, { undo, redo, canUndo: hist.past.length > 0, canRedo: hist.future.length > 0 }];
};

// ───── file helpers ─────
const fileToDataURL = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result);
  r.onerror = rej;
  r.readAsDataURL(file);
});

// Compress an uploaded image: resize long edge to IMG_MAX_DIM if larger,
// re-encode at IMG_QUALITY. Saves a LOT of localStorage space without affecting
// banner export quality (banner max width is 1200, so 1500 is plenty of headroom).
const compressImage = (file) => new Promise(async (resolve, reject) => {
  try {
    const dataUrl = await fileToDataURL(file);
    const img = new Image();
    img.onerror = reject;
    img.onload = () => {
      const { width: w, height: h } = img;
      const maxEdge = Math.max(w, h);
      // skip re-encode if already small in both dims AND original file is reasonably small
      if (maxEdge <= IMG_MAX_DIM && file.size <= 500_000) {
        resolve({ src: dataUrl, name: file.name });
        return;
      }
      const ratio = maxEdge > IMG_MAX_DIM ? IMG_MAX_DIM / maxEdge : 1;
      const newW = Math.round(w * ratio);
      const newH = Math.round(h * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = newW;
      canvas.height = newH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, newW, newH);
      // PNG preserves transparency; everything else gets JPEG for smaller payload
      const mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
      const out = canvas.toDataURL(mime, IMG_QUALITY);
      resolve({ src: out, name: file.name });
    };
    img.src = dataUrl;
  } catch (e) { reject(e); }
});

const acceptImage = (f) => f && /^image\//.test(f.type);

// ───── main App ─────
function App() {
  const [initialState] = useState(() => loadInitial());
  const [rawState, setRawState, history] = useUndoableState(initialState);

  // ── multi-cover state shim ─────────────────────────────────────────────
  // Children expect a flat state shape (state.title, state.slotImgs, etc.).  Internally
  // those fields live in rawState.covers[activeCoverIdx].  We construct a `state` that
  // merges shared fields + the active cover, and a `setState` that routes patches back
  // to the right place.
  const currentCover = rawState.covers[rawState.activeCoverIdx] || rawState.covers[0];
  const state = React.useMemo(() => ({ ...rawState, ...currentCover }), [rawState, currentCover]);
  const setState = useCallback((updater, opts) => {
    setRawState(prev => {
      const flat = { ...prev, ...(prev.covers[prev.activeCoverIdx] || prev.covers[0]) };
      const next = typeof updater === 'function' ? updater(flat) : updater;
      // Split next into shared vs per-cover patches
      const coverPatch = {};
      const sharedPatch = {};
      for (const k in next) {
        if (k === 'covers' || k === 'activeCoverIdx') continue; // protected
        if (COVER_FIELDS.includes(k)) coverPatch[k] = next[k];
        else sharedPatch[k] = next[k];
      }
      return {
        ...prev,
        ...sharedPatch,
        covers: prev.covers.map((c, i) =>
          i === prev.activeCoverIdx ? { ...c, ...coverPatch } : c
        ),
      };
    }, opts);
  }, [setRawState]);
  // ── /multi-cover state shim ────────────────────────────────────────────

  const [activeTool, setActiveTool] = useState('images');
  const [propsTab, setPropsTab] = useState('selection');
  const [activeSlot, setActiveSlot] = useState(0);
  const [toast, setToast] = useState(null);
  const [savedAt, setSavedAt] = useState(Date.now());
  const [selectedLayer, _setSelectedLayer] = useState('title');
  // wrap selection so clicking a layer always brings the user to the 属性 tab
  const setSelectedLayer = useCallback((id) => {
    _setSelectedLayer(id);
    setPropsTab('selection');
  }, []);
  const fileInputRef = useRef(null);
  const slotFileRef = useRef(null);

  // sync radius CSS vars
  useEffect(() => {
    const r = state.radius || 0;
    document.documentElement.style.setProperty('--r-sm', Math.max(0, r * 0.5) + 'px');
    document.documentElement.style.setProperty('--r', Math.max(0, r) + 'px');
    document.documentElement.style.setProperty('--r-lg', Math.max(0, r * 1.6) + 'px');
  }, [state.radius]);

  // autosave (debounced) — save the RAW state (with covers array), not the flat view
  useEffect(() => {
    const id = setTimeout(() => {
      saveState(rawState);
      setSavedAt(Date.now());
    }, 600);
    return () => clearTimeout(id);
  }, [rawState]);
  // flush on unload — guarantees a save even if you refresh within the 600ms debounce
  useEffect(() => {
    const flush = () => { saveState(rawState); };
    window.addEventListener('beforeunload', flush);
    window.addEventListener('pagehide', flush);
    return () => {
      window.removeEventListener('beforeunload', flush);
      window.removeEventListener('pagehide', flush);
    };
  }, [rawState]);

  // show toast
  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  };

  // keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      const tag = (e.target.tagName || '').toLowerCase();
      const editable = e.target.isContentEditable || tag === 'input' || tag === 'textarea';
      if (meta && e.key === 'z' && !e.shiftKey) {
        if (editable) return;
        e.preventDefault();
        history.undo();
      } else if (meta && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        if (editable) return;
        e.preventDefault();
        history.redo();
      } else if (meta && e.key === 'e') {
        e.preventDefault();
        exportPNG();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  // ───── image handling ─────
  const addToLibraryAndSlot = async (files, targetSlot = null) => {
    const list = Array.from(files).filter(acceptImage);
    if (list.length === 0) return;
    // ── enforce library cap (20) ──
    const space = LIBRARY_MAX - (rawState.library?.length || 0);
    if (space <= 0) {
      alert(`素材池已满（上限 ${LIBRARY_MAX} 张）。\n请先在下方图库里删除一些旧图，再上传新的。`);
      return;
    }
    const accepted = list.slice(0, space);
    const dropped = list.length - accepted.length;
    // ── compress each image (resize to ${IMG_MAX_DIM}px + re-encode JPEG ${IMG_QUALITY * 100}%) ──
    const items = [];
    for (const f of accepted) {
      try {
        const item = await compressImage(f);
        items.push(item);
      } catch (e) {
        console.warn('compressImage failed for', f.name, e);
      }
    }
    if (items.length === 0) return;
    setState(prev => {
      const newLib = [...prev.library, ...items];
      const newSlots = [...prev.slotImgs];
      // fill empty slots first
      let slotIdx = targetSlot;
      let itemIdx = 0;
      if (slotIdx == null) {
        for (let i = 0; i < prev.collageCount && itemIdx < items.length; i++) {
          if (!newSlots[i]) {
            newSlots[i] = { ...items[itemIdx], x: 0, y: 0, scale: 1 };
            itemIdx++;
          }
        }
      } else {
        newSlots[slotIdx] = { ...items[0], x: 0, y: 0, scale: 1 };
      }
      return { ...prev, library: newLib, slotImgs: newSlots };
    });
    if (dropped > 0) {
      flash(`已上传 ${items.length} 张，${dropped} 张超过上限未添加`);
    } else {
      flash(`已上传 ${items.length} 张图`);
    }
  };

  const setSlotFromLibrary = (idx, libItem) => {
    setState(prev => {
      const newSlots = [...prev.slotImgs];
      newSlots[idx] = { src: libItem.src, name: libItem.name, x: 0, y: 0, scale: 1 };
      return { ...prev, slotImgs: newSlots };
    });
  };

  // Drop a library image (by src) onto a specific slot — for drag-and-drop.
  const setSlotFromSrc = (idx, src) => {
    const libItem = state.library.find(u => u.src === src);
    if (libItem) setSlotFromLibrary(idx, libItem);
  };

  const clearLibrary = useCallback(() => {
    const count = rawState.library?.length || 0;
    if (count === 0) return;
    if (!confirm(`清空素材池里全部 ${count} 张图？\n\n（已经填到画布 slot 里的图不受影响，画布上的图是独立副本。）`)) return;
    setRawState(prev => ({ ...prev, library: [] }));
    flash(`已清空 ${count} 张素材`);
  }, [rawState.library, setRawState]);

  // Remove a library image. If it's used by any slot, clear those slots too.
  const deleteLibraryItem = (libIdx) => {
    const item = state.library[libIdx];
    if (!item) return;
    const usedInSlots = state.slotImgs
      .map((s, i) => (s && s.src === item.src) ? i + 1 : null)
      .filter(Boolean);
    const msg = usedInSlots.length > 0
      ? `这张图正在 Slot ${usedInSlots.join(' / ')} 中使用。删除会同时清空这些 slot。继续？`
      : '从图库删除这张图？';
    if (!confirm(msg)) return;
    setState(prev => {
      const newSlots = prev.slotImgs.map(s => (s && s.src === item.src) ? null : s);
      const newLib = prev.library.filter((_, j) => j !== libIdx);
      return { ...prev, library: newLib, slotImgs: newSlots };
    });
    flash('已删除');
  };

  const clearSlot = (idx) => {
    setState(prev => {
      const newSlots = [...prev.slotImgs];
      newSlots[idx] = null;
      return { ...prev, slotImgs: newSlots };
    });
  };

  const updateSlot = (idx, patch) => {
    setState(prev => {
      const newSlots = [...prev.slotImgs];
      if (newSlots[idx]) newSlots[idx] = { ...newSlots[idx], ...patch };
      return { ...prev, slotImgs: newSlots };
    }, { skipHistory: true });
  };

  // ───── tweak setters ─────
  const setTweak = (key, val) => setState(prev => ({ ...prev, [key]: val }));

  const changeCollage = (n) => {
    setState(prev => {
      // truncate or extend slot array
      const newSlots = [...prev.slotImgs];
      while (newSlots.length < 3) newSlots.push(null);
      return { ...prev, collageCount: n, slotImgs: newSlots };
    });
  };

  // ───── title preset CRUD ─────
  const applyPreset = (p) => {
    setState(prev => ({
      ...prev,
      titleFont: p.font,
      titleAlign: p.align,
      titleSize: p.size,
      titleColor: p.color,
      titleLayout: p.layout,
      titleWeight: p.weight,
      textGap: p.gap ?? prev.textGap ?? 18,
      textPadX: p.padX ?? prev.textPadX ?? 55,
      textPadBottom: p.padBottom ?? prev.textPadBottom ?? 30,
      activePresetId: p.id,
    }));
  };
  const savePreset = () => {
    setState(prev => ({
      ...prev,
      titlePresets: prev.titlePresets.map(p =>
        p.id === prev.activePresetId
          ? { ...p,
              font: prev.titleFont, align: prev.titleAlign, size: prev.titleSize,
              color: prev.titleColor, layout: prev.titleLayout || 'center',
              weight: prev.titleWeight ?? 600,
              gap: prev.textGap ?? 18, padX: prev.textPadX ?? 55,
              padBottom: prev.textPadBottom ?? 30 }
          : p
      ),
    }));
    flash('已更新当前预设');
  };
  const addPreset = () => {
    const id = 'custom-' + Date.now();
    const num = state.titlePresets.filter(p => p.id.startsWith('custom-')).length + 1;
    const np = {
      id, label: `我的预设 ${num}`, sub: '自定义',
      font: state.titleFont, align: state.titleAlign, size: state.titleSize,
      color: state.titleColor, layout: state.titleLayout || 'center',
      weight: state.titleWeight ?? 600,
      gap: state.textGap ?? 18, padX: state.textPadX ?? 55,
      padBottom: state.textPadBottom ?? 30,
    };
    setState(prev => ({
      ...prev,
      titlePresets: [...prev.titlePresets, np],
      activePresetId: id,
    }));
    flash('已新增预设');
  };
  const deletePreset = (id) => {
    if (!confirm('删除这个样式预设？')) return;
    setState(prev => ({
      ...prev,
      titlePresets: prev.titlePresets.filter(p => p.id !== id),
      activePresetId: prev.activePresetId === id ? null : prev.activePresetId,
    }));
  };
  const reorderPresets = (fromId, toId) => {
    if (fromId === toId) return;
    setState(prev => {
      const presets = [...prev.titlePresets];
      const fromIdx = presets.findIndex(p => p.id === fromId);
      const toIdx = presets.findIndex(p => p.id === toId);
      if (fromIdx === -1 || toIdx === -1) return prev;
      const [moved] = presets.splice(fromIdx, 1);
      presets.splice(toIdx, 0, moved);
      return { ...prev, titlePresets: presets };
    });
  };
  // Export presets to a downloadable JSON file (permanent backup outside the browser)
  const exportPresets = () => {
    const payload = { app: 'cover-studio', kind: 'title-presets', v: 1, presets: state.titlePresets };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cover-studio-presets-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    flash(`已导出 ${state.titlePresets.length} 个预设`);
  };
  const importPresets = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const presets = Array.isArray(parsed) ? parsed : parsed.presets;
        if (!Array.isArray(presets) || presets.length === 0) throw new Error('No presets');
        const replace = confirm(
          `导入 ${presets.length} 个预设。\n\n确定 = 替换当前所有预设\n取消 = 追加到现有列表`
        );
        setState(prev => ({
          ...prev,
          titlePresets: replace ? presets : [...prev.titlePresets, ...presets],
        }));
        flash(replace ? `已替换为 ${presets.length} 个预设` : `已追加 ${presets.length} 个预设`);
      } catch (err) {
        alert('导入失败：JSON 格式不正确');
      }
    };
    reader.readAsText(file);
  };

  // ───── template CRUD ─────
  // Apply template fields to the CURRENT cover (preserves title/subtitle text + images)
  const applyTemplateToCurrent = useCallback((tpl) => {
    const patch = extractTemplateFields(tpl);
    setState(prev => ({ ...prev, ...patch }));
    flash(`已套用「${tpl.name}」到当前画布`);
  }, [setState]);

  // Create a new canvas based on the template (with placeholder text)
  const applyTemplateAsNewCanvas = useCallback((tpl) => {
    if ((rawState.covers?.length || 0) >= CANVAS_MAX) {
      alert(`画布数量已达上限（${CANVAS_MAX} 张）。\n请先删除一些不再需要的画布。`);
      return;
    }
    setRawState(prev => {
      const newCover = mkCover({
        ...extractTemplateFields(tpl),
        filename: tpl.name,
        title: '点击编辑标题',
        subtitle: '副标题占位',
        slotImgs: Array(tpl.collageCount || 1).fill(null).concat([null, null, null]).slice(0, 3),
      });
      return {
        ...prev,
        covers: [...prev.covers, newCover],
        activeCoverIdx: prev.covers.length,
      };
    });
    flash(`已新增画布（基于「${tpl.name}」）`);
  }, [setRawState]);

  // Snapshot current cover's styling as a new user template
  const saveCurrentAsTemplate = useCallback(() => {
    const cur = rawState.covers[rawState.activeCoverIdx];
    const customCount = rawState.templates.filter(t => t.kind === 'custom').length + 1;
    const defaultName = `我的模板 ${customCount}`;
    const name = prompt('给这个模板起个名字：', defaultName);
    if (!name) return;
    const newTemplate = {
      ...extractTemplateFields(cur),
      id: 'tpl-custom-' + Date.now().toString(36),
      name: name.trim() || defaultName,
      kind: 'custom',
      createdAt: Date.now(),
    };
    setRawState(prev => ({
      ...prev,
      templates: [...prev.templates, newTemplate],
    }));
    flash('已保存为模板');
  }, [rawState, setRawState]);

  const deleteTemplate = useCallback((id) => {
    const tpl = rawState.templates.find(t => t.id === id);
    if (!tpl || tpl.kind !== 'custom') return;
    if (!confirm(`删除模板「${tpl.name}」？`)) return;
    setRawState(prev => ({
      ...prev,
      templates: prev.templates.filter(t => t.id !== id),
    }));
    flash('已删除模板');
  }, [rawState, setRawState]);

  // ───── size-preset CRUD (shared across covers, persisted) ─────
  const addSizePreset = () => {
    const { w, h } = state.bannerSize;
    const dup = (rawState.sizePresets || []).find(p => p.w === w && p.h === h);
    if (dup) { flash(`已有相同尺寸预设「${dup.name}」`); return; }
    const defName = `${w}×${h}`;
    const name = prompt('给这个尺寸预设起个名字：', defName);
    if (name === null) return;
    const id = 'size-' + Date.now().toString(36);
    setRawState(prev => ({
      ...prev,
      sizePresets: [...(prev.sizePresets || []), { id, name: (name.trim() || defName), w, h }],
    }));
    flash('已存为尺寸预设');
  };
  const deleteSizePreset = (id) => {
    if (!confirm('删除这个尺寸预设？')) return;
    setRawState(prev => ({
      ...prev,
      sizePresets: (prev.sizePresets || []).filter(p => p.id !== id),
      defaultSizeId: prev.defaultSizeId === id ? 'bi-banner' : prev.defaultSizeId,
    }));
  };
  const setDefaultSize = (id) => {
    setRawState(prev => ({ ...prev, defaultSizeId: id }));
    flash('已设为默认尺寸');
  };

  // ───── reset ─────
  const reset = () => {
    if (!confirm('重置为初始状态？已上传的图片和所有画布会被清空。')) return;
    setRawState(() => ({
      covers: [mkCover()],
      activeCoverIdx: 0,
      library: [],
      titlePresets: DEFAULT_TITLE_PRESETS.map(p => ({ ...p })),
      templates: DEFAULT_TEMPLATES.map(t => ({ ...t })),
      sizePresets: [],
      defaultSizeId: 'bi-banner',
    }));
    localStorage.removeItem(STORAGE_KEY);
    flash('已重置');
  };

  // ───── canvas (multi-cover) management ─────
  const addCanvas = useCallback(() => {
    if ((rawState.covers?.length || 0) >= CANVAS_MAX) {
      alert(`画布数量已达上限（${CANVAS_MAX} 张）。\n请先删除一些不再需要的画布。`);
      return;
    }
    setRawState(prev => {
      // pick the smallest unused "封面N" number so deletions free up slots
      const used = new Set(
        prev.covers
          .map(c => /^封面(\d+)$/.exec((c.filename || '').trim()))
          .filter(Boolean)
          .map(m => +m[1])
      );
      let n = 1;
      while (used.has(n)) n++;
      const newCover = mkCover({ filename: `封面${n}`, bannerSize: resolveDefaultSize(prev) });
      return {
        ...prev,
        covers: [...prev.covers, newCover],
        activeCoverIdx: prev.covers.length,
      };
    });
    flash('已新增画布');
  }, [rawState.covers, setRawState]);
  const switchCanvas = useCallback((idx) => {
    setRawState(prev => {
      if (idx < 0 || idx >= prev.covers.length || idx === prev.activeCoverIdx) return prev;
      return { ...prev, activeCoverIdx: idx };
    });
  }, [setRawState]);
  const deleteCanvas = useCallback((idx) => {
    setRawState(prev => {
      if (prev.covers.length <= 1) {
        alert('至少保留一张画布');
        return prev;
      }
      const newCovers = prev.covers.filter((_, i) => i !== idx);
      const newActive = prev.activeCoverIdx > idx
        ? prev.activeCoverIdx - 1
        : Math.min(prev.activeCoverIdx, newCovers.length - 1);
      return { ...prev, covers: newCovers, activeCoverIdx: newActive };
    });
    flash('已删除画布');
  }, [setRawState]);
  const duplicateCanvas = useCallback((idx) => {
    if ((rawState.covers?.length || 0) >= CANVAS_MAX) {
      alert(`画布数量已达上限（${CANVAS_MAX} 张）。\n请先删除一些不再需要的画布。`);
      return;
    }
    setRawState(prev => {
      const src = prev.covers[idx];
      if (!src) return prev;
      const copy = mkCover({ ...src, filename: (src.filename || '未命名') + ' 副本' });
      const newCovers = [...prev.covers];
      newCovers.splice(idx + 1, 0, copy);
      return { ...prev, covers: newCovers, activeCoverIdx: idx + 1 };
    });
    flash('已复制画布');
  }, [rawState.covers, setRawState]);

  // ───── export ─────
  // Render a cover object to a PNG Blob (2× SSAA → downscale).
  // Pure: takes a cover, returns Promise<Blob>.  Works for both single and batch export.
  const renderCoverToBlob = useCallback(async (cover) => {
    const { w, h } = cover.bannerSize;
    const SSAA = 2;
    const canvas = document.createElement('canvas');
    canvas.width = w * SSAA;
    canvas.height = h * SSAA;
    const ctx = canvas.getContext('2d');
    ctx.scale(SSAA, SSAA);
    if ('textRendering' in ctx) ctx.textRendering = 'geometricPrecision';
    if ('fontKerning' in ctx) ctx.fontKerning = 'normal';
    if ('letterSpacing' in ctx) ctx.letterSpacing = '-0.005em';

    // background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, w, h);

    // load all slot images
    const count = cover.collageCount;
    const slotW = w / count;
    const imgs = await Promise.all(
      cover.slotImgs.slice(0, count).map(s => {
        if (!s) return null;
        return new Promise((res) => {
          const img = new Image();
          img.onload = () => res({ img, slot: s });
          img.onerror = () => res(null);
          img.src = s.src;
        });
      })
    );

    imgs.forEach((it, i) => {
      ctx.save();
      const sx = i * slotW;
      ctx.beginPath();
      ctx.rect(sx, 0, slotW, h);
      ctx.clip();
      if (it) {
        const { img, slot } = it;
        const naturalScale = Math.max(slotW / img.width, h / img.height);
        const userScale = slot.scale || 1;
        const totalScale = naturalScale * userScale;
        const dw = img.width * totalScale;
        const dh = img.height * totalScale;
        const objX = (50 + clampPos(slot.x)) / 100;
        const objY = (50 + clampPos(slot.y)) / 100;
        const dx = sx + (slotW - dw) * objX;
        const dy = (h - dh) * objY;
        ctx.globalAlpha = (cover.imageOpacity ?? 100) / 100;
        ctx.drawImage(img, dx, dy, dw, dh);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = '#25201d';
        ctx.fillRect(sx, 0, slotW, h);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '24px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`SLOT ${String(i+1).padStart(2,'0')}`, sx + slotW / 2, h / 2);
      }
      ctx.restore();
    });

    const overlayStrength = (cover.overlay ?? 42) / 100;
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, `rgba(0,0,0,${overlayStrength * 0.55})`);
    grad.addColorStop(0.6, `rgba(0,0,0,${overlayStrength * 0.7})`);
    grad.addColorStop(1, `rgba(0,0,0,${overlayStrength * 0.85})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    if (count > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      for (let i = 1; i < count; i++) {
        ctx.fillRect((i / count) * w - 0.5, 0, 1, h);
      }
    }

    const titleFontFamily = cover.titleFont === 'serif' ? 'Noto Serif SC, serif'
      : cover.titleFont === 'display' ? 'Bricolage Grotesque, serif'
      : '-apple-system, BlinkMacSystemFont, PingFang SC, Noto Sans SC, sans-serif';
    const tSize = cover.titleSize || 40;
    const tWeight = cover.titleWeight ?? 600;
    const layout = cover.titleLayout || 'center';
    const titleAlpha = (cover.titleOpacity ?? 100) / 100;
    const subtitleColor = cover.subtitleColor || '#ffffff';
    const subtitleAlpha = (cover.subtitleOpacity ?? 85) / 100;
    const showTitle = cover.titleVisible !== false;
    const showSubtitle = cover.subtitleVisible !== false;

    if (showTitle || showSubtitle) {
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = hexToRgba(cover.titleColor || '#ffffff', titleAlpha);
      ctx.font = `${tWeight} ${tSize}px ${titleFontFamily}`;
      ctx.textBaseline = 'middle';

      if (layout === 'bottom-left') {
        const padX = cover.textPadX ?? 30;
        const padBottom = cover.textPadBottom ?? 30;
        const gap = cover.textGap ?? 7;
        ctx.textAlign = 'left';
        const maxTitleWidth = w - padX * 2;
        const lineHeight = tSize * 1.25;
        const subSize = 20;
        const titleY = h - padBottom - lineHeight / 2;
        // when title is hidden, subtitle takes the title's bottom position
        const subY = showTitle ? (titleY - lineHeight / 2 - gap - subSize / 2) : titleY;
        if (showTitle) {
          let titleLine = cover.title || '';
          if (ctx.measureText(titleLine).width > maxTitleWidth) {
            while (titleLine.length > 0 && ctx.measureText(titleLine + '…').width > maxTitleWidth) {
              titleLine = Array.from(titleLine).slice(0, -1).join('');
            }
            titleLine = titleLine + '…';
          }
          ctx.fillText(titleLine, padX, titleY);
        }
        if (showSubtitle) {
          ctx.shadowBlur = 10;
          ctx.fillStyle = hexToRgba(subtitleColor, subtitleAlpha);
          ctx.font = `400 ${subSize}px ${titleFontFamily}`;
          ctx.fillText(cover.subtitle || '', padX, subY);
        }
      } else {
        ctx.textAlign = cover.titleAlign || 'center';
        const padX = cover.textPadX ?? 55;
        const gap = cover.textGap ?? 18;
        const maxTitleWidth = w - padX * 2;
        const lineHeight = tSize * 1.25;
        const subSize = 22;
        const xPos = cover.titleAlign === 'left' ? padX
          : cover.titleAlign === 'right' ? w - padX
          : w / 2;
        if (showTitle && showSubtitle) {
          const MAX_TITLE_LINES = 2;
          let titleLines = wrapText(ctx, cover.title, maxTitleWidth);
          if (titleLines.length > MAX_TITLE_LINES) {
            const kept = titleLines.slice(0, MAX_TITLE_LINES);
            let last = kept[MAX_TITLE_LINES - 1];
            while (ctx.measureText(last + '…').width > maxTitleWidth && last.length > 0) {
              last = Array.from(last).slice(0, -1).join('');
            }
            kept[MAX_TITLE_LINES - 1] = last + '…';
            titleLines = kept;
          }
          const totalH = titleLines.length * lineHeight + gap + subSize;
          const yStart = (h - totalH) / 2 + lineHeight / 2;
          titleLines.forEach((line, i) => {
            ctx.fillText(line, xPos, yStart + i * lineHeight);
          });
          ctx.shadowBlur = 10;
          ctx.fillStyle = hexToRgba(subtitleColor, subtitleAlpha);
          ctx.font = `400 ${subSize}px ${titleFontFamily}`;
          ctx.fillText(cover.subtitle || '', xPos, yStart + titleLines.length * lineHeight + gap);
        } else if (showTitle) {
          // subtitle hidden — center the title alone
          const MAX_TITLE_LINES = 2;
          let titleLines = wrapText(ctx, cover.title, maxTitleWidth);
          if (titleLines.length > MAX_TITLE_LINES) {
            const kept = titleLines.slice(0, MAX_TITLE_LINES);
            let last = kept[MAX_TITLE_LINES - 1];
            while (ctx.measureText(last + '…').width > maxTitleWidth && last.length > 0) {
              last = Array.from(last).slice(0, -1).join('');
            }
            kept[MAX_TITLE_LINES - 1] = last + '…';
            titleLines = kept;
          }
          const totalH = titleLines.length * lineHeight;
          const yStart = (h - totalH) / 2 + lineHeight / 2;
          titleLines.forEach((line, i) => {
            ctx.fillText(line, xPos, yStart + i * lineHeight);
          });
        } else if (showSubtitle) {
          // title hidden — center subtitle alone
          ctx.shadowBlur = 10;
          ctx.fillStyle = hexToRgba(subtitleColor, subtitleAlpha);
          ctx.font = `400 ${subSize}px ${titleFontFamily}`;
          ctx.fillText(cover.subtitle || '', xPos, h / 2);
        }
      }
    }

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // downscale from 2× SSAA → user spec
    const outCanvas = document.createElement('canvas');
    outCanvas.width = w;
    outCanvas.height = h;
    const outCtx = outCanvas.getContext('2d');
    outCtx.imageSmoothingEnabled = true;
    outCtx.imageSmoothingQuality = 'high';
    outCtx.drawImage(canvas, 0, 0, w, h);

    return new Promise(resolve => outCanvas.toBlob(resolve, 'image/png'));
  }, []);

  const safeFilename = (name) => (name || 'cover').replace(/[\s\/\\:*?"<>|]+/g, '_');

  // Fallback download — used when the File System Access API isn't available
  const downloadBlob = (blob, name) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Export the currently-active canvas. Uses showSaveFilePicker if available so the user
  // picks the file location; otherwise falls back to the browser's default download.
  const exportPNG = async () => {
    const cover = rawState.covers[rawState.activeCoverIdx];
    const blob = await renderCoverToBlob(cover);
    const filename = safeFilename(cover.filename) + '.png';
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: 'PNG image', accept: { 'image/png': ['.png'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        flash('已导出 ' + cover.bannerSize.w + ' × ' + cover.bannerSize.h);
        return;
      } catch (e) {
        // User canceled, or API failed — fall through to download
        if (e && e.name === 'AbortError') return;
      }
    }
    downloadBlob(blob, filename);
    flash('已导出 ' + cover.bannerSize.w + ' × ' + cover.bannerSize.h);
  };

  // Batch-export every canvas. Uses showDirectoryPicker so the user picks ONE folder
  // and we write all PNGs into it; falls back to sequential downloads.
  const exportAllPNGs = async () => {
    const covers = rawState.covers;
    if (covers.length === 0) return;

    let dirHandle = null;
    if ('showDirectoryPicker' in window) {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      } catch (e) {
        if (e && e.name === 'AbortError') return;
        // permission denied or unavailable — fall through to downloads
      }
    } else if (covers.length > 1) {
      const ok = confirm(
        `当前浏览器不支持选择文件夹（仅 Chrome / Edge 支持）。\n\n` +
        `将依次下载 ${covers.length} 个文件到默认下载目录。继续？`
      );
      if (!ok) return;
    }

    flash(`正在导出 ${covers.length} 张…`);
    // Dedupe file names if any covers share a filename
    const usedNames = new Set();
    const makeUnique = (name) => {
      let candidate = name;
      let i = 2;
      while (usedNames.has(candidate)) candidate = name.replace(/\.png$/, '') + '-' + (i++) + '.png';
      usedNames.add(candidate);
      return candidate;
    };
    for (let i = 0; i < covers.length; i++) {
      const cover = covers[i];
      const blob = await renderCoverToBlob(cover);
      const filename = makeUnique(safeFilename(cover.filename) + '.png');
      if (dirHandle) {
        try {
          const fh = await dirHandle.getFileHandle(filename, { create: true });
          const w = await fh.createWritable();
          await w.write(blob);
          await w.close();
        } catch (e) {
          console.warn('Failed to write', filename, e);
        }
      } else {
        downloadBlob(blob, filename);
        // small delay so browsers don't block subsequent downloads
        await new Promise(r => setTimeout(r, 250));
      }
    }
    flash(`已导出 ${covers.length} 张 PNG`);
  };

  // wrap helper
  function wrapText(ctx, text, maxWidth) {
    if (!text) return [''];
    // Chinese: break per-character; English: break per-word
    const chars = Array.from(text);
    const lines = [];
    let line = '';
    for (const c of chars) {
      const test = line + c;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = c;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  const savedAgo = Math.max(1, Math.round((Date.now() - savedAt) / 1000));

  // ───── render ─────
  return (
    <div className="cs-app">
      {/* TOP BAR */}
      <header className="cs-topbar">
        <div className="cs-brand">
          <div className="dot" style={{ background: PRIMARY }}>封</div>
          <span>封面工坊</span>
        </div>
        <div className="cs-divider"></div>
        <input
          className="cs-filename"
          value={state.filename}
          onChange={(e) => setTweak('filename', e.target.value)}
        />
        <span className="cs-saved">· 已自动保存 · {savedAgo} 秒前</span>

        <div className="row" style={{ marginLeft: 10, gap: 4 }}>
          <button
            className="cs-textbtn"
            disabled={!history.canUndo}
            onClick={history.undo}
            title="撤销 ⌘Z"
          >
            <Icon name="undo" size={14}/> 撤销
          </button>
          <button
            className="cs-textbtn"
            disabled={!history.canRedo}
            onClick={history.redo}
            title="重做 ⌘⇧Z"
          >
            <Icon name="redo" size={14}/> 重做
          </button>
          <button
            className="cs-textbtn"
            onClick={reset}
            title="重置全部画布"
          >
            <Icon name="history" size={14}/> 重置
          </button>
        </div>

        <div className="cs-spacer"></div>

        {rawState.covers.length > 1 && (
          <button
            className="cs-btn ghost"
            style={{ borderColor: PRIMARY, color: PRIMARY }}
            onClick={exportAllPNGs}
            title={`一次导出全部 ${rawState.covers.length} 张封面`}
          >
            <Icon name="download" size={14}/> 导出全部 ({rawState.covers.length})
          </button>
        )}
        <button className="cs-btn primary" style={{ background: PRIMARY }} onClick={exportPNG}
          title="导出当前画布"
        >
          <Icon name="download" size={14}/> 导出
        </button>
      </header>

      {/* MAIN */}
      <div className="cs-main">
        {/* tool rail */}
        <aside className="cs-rail">
          {[
            { id: 'images', label: '图片', icon: 'image' },
            { id: 'templates', label: '模板', icon: 'layout' },
          ].map(t => (
            <button key={t.id} className={'tool' + (activeTool === t.id ? ' active' : '')} onClick={() => setActiveTool(t.id)}>
              <Icon name={t.icon} size={18}/>
              <span>{t.label}</span>
            </button>
          ))}
          <div className="cs-rail-spacer"></div>
        </aside>

        {/* side panel */}
        <section className="cs-panel">
          {activeTool === 'images' && (
            <ImagesPanel
              state={state}
              onUpload={addToLibraryAndSlot}
              onPickLibrary={setSlotFromLibrary}
              onDeleteLibrary={deleteLibraryItem}
              onClearLibrary={clearLibrary}
              onChangeCollage={changeCollage}
              activeSlot={activeSlot}
              setActiveSlot={setActiveSlot}
              onClearSlot={clearSlot}
              flash={flash}
            />
          )}
          {activeTool === 'templates' && (
            <TemplatesPanel
              templates={rawState.templates}
              onApplyToCurrent={applyTemplateToCurrent}
              onApplyAsNew={applyTemplateAsNewCanvas}
              onSaveCurrent={saveCurrentAsTemplate}
              onDelete={deleteTemplate}
              renderThumb={renderCoverToBlob}
            />
          )}
        </section>

        {/* stage */}
        <main className="cs-stage">
          <div className="cs-stage-tb">
            <span className="size-chip active">
              <Icon name="layout" size={11}/> <span>文章 Banner</span> <span className="num">{state.bannerSize.w} × {state.bannerSize.h}</span>
            </span>
            <span className="size-chip">方图 <span className="num">1080 × 1080</span></span>
            <span className="size-chip">竖版 <span className="num">900 × 1600</span></span>
            <div className="cs-spacer"></div>
            <div className="row" style={{ gap: 8, color: 'var(--ink-3)', fontSize: 11 }}>
              <Icon name="grid" size={14}/>
              <span>{state.collageCount} 张拼图 · slot {state.slotImgs.slice(0, state.collageCount).filter(Boolean).length}/{state.collageCount} 已上传</span>
            </div>
          </div>

          <div className="cs-stage-body">
            <Banner
              state={state}
              activeSlot={activeSlot}
              setActiveSlot={setActiveSlot}
              updateSlot={updateSlot}
              setTitle={(v) => setState(prev => ({ ...prev, title: clampTitle(v) }))}
              setSubtitle={(v) => setState(prev => ({ ...prev, subtitle: v }))}
              setSelectedLayer={setSelectedLayer}
              onDropFromLibrary={setSlotFromSrc}
              covers={rawState.covers}
              activeCoverIdx={rawState.activeCoverIdx}
              canvasActions={{ addCanvas, switchCanvas, deleteCanvas, duplicateCanvas }}
            />
          </div>
        </main>

        {/* right rail — only 2 tabs: 属性 (selection) + 画布 (canvas) */}
        <aside className="cs-props">
          <div className="tabs">
            {[
              { id: 'selection', label: '属性' },
              { id: 'canvas', label: '画布' },
            ].map(t => (
              <button key={t.id} className={'tab' + (propsTab === t.id ? ' active' : '')} onClick={() => setPropsTab(t.id)}>{t.label}</button>
            ))}
            <div style={{ flex: 1 }}></div>
          </div>
          {propsTab === 'selection' && (
            <SelectionProps
              state={state}
              setState={setState}
              selected={selectedLayer}
              presetActions={{ applyPreset, savePreset, addPreset, deletePreset, reorderPresets, exportPresets, importPresets }}
            />
          )}
          {propsTab === 'canvas' && (
            <DesignProps
              state={state}
              setTweak={setTweak}
              sizePresets={rawState.sizePresets || []}
              defaultSizeId={rawState.defaultSizeId}
              onAddSizePreset={addSizePreset}
              onDeleteSizePreset={deleteSizePreset}
              onSetDefaultSize={setDefaultSize}
            />
          )}
        </aside>
      </div>

      {toast && <div className="toast"><Icon name="check" size={14}/> {toast}</div>}
    </div>
  );
}

// ───── ImagesPanel ─────
function ImagesPanel({ state, onUpload, onPickLibrary, onDeleteLibrary, onClearLibrary, onChangeCollage, activeSlot, setActiveSlot, onClearSlot, flash }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);

  const layouts = [
    { n: 1, label: '单图', svg: <rect x="2" y="2" width="40" height="20" rx="2"/> },
    { n: 2, label: '左右拼', svg: <><rect x="2" y="2" width="19" height="20" rx="2"/><rect x="23" y="2" width="19" height="20" rx="2"/></> },
    { n: 3, label: '三联拼', svg: <><rect x="2" y="2" width="12" height="20" rx="2"/><rect x="16" y="2" width="12" height="20" rx="2"/><rect x="30" y="2" width="12" height="20" rx="2"/></> },
  ];

  return (
    <>
      <div className="cs-panel-hd">
        <h3>图片</h3>
        <span className="tag" style={{ background: 'rgba(255,84,54,.08)', color: PRIMARY, fontWeight: 600 }}>主要素材</span>
      </div>
      <div className="cs-panel-body col" style={{ gap: 14 }}>
        {/* upload zone */}
        <div
          className={'upload-zone' + (drag ? ' drag' : '')}
          onClick={() => inputRef.current.click()}
          onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={(e) => {
            e.preventDefault();
            setDrag(false);
            if (e.dataTransfer.files) onUpload(e.dataTransfer.files);
          }}
        >
          <span className="upload-icon" style={{ background: PRIMARY }}>
            <Icon name="upload" size={18}/>
          </span>
          <div style={{ fontSize: 13, fontWeight: 500 }}>拖入图片，或点击上传</div>
          <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.5 }}>
            支持 JPG / PNG / WebP · 一次可选多张<br/>
            自动填到空 slot；可在下方图库重新分配
          </div>
          <input
            ref={inputRef}
            type="file" multiple accept="image/*"
            className="file-input"
            onChange={(e) => {
              if (e.target.files) onUpload(e.target.files);
              e.target.value = '';
            }}
          />
        </div>

        {/* collage selector */}
        <div className="col" style={{ gap: 8 }}>
          <div className="row" style={{ justifyContent: 'space-between' }}>
            <span style={{ fontSize: 12, fontWeight: 500 }}>拼图布局</span>
            <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>无间隔 · 等宽</span>
          </div>
          <div className="layout-row">
            {layouts.map(L => (
              <button key={L.n}
                className={'layout-card' + (state.collageCount === L.n ? ' active' : '')}
                onClick={() => onChangeCollage(L.n)}
              >
                <svg viewBox="0 0 44 24" width={44} height={24} fill="none"
                  stroke={state.collageCount === L.n ? PRIMARY : 'var(--ink-2)'} strokeWidth="1.4">
                  {L.svg}
                </svg>

// ───── Template card with live thumbnail + action menu ─────
function TemplateCard({ template, onApplyCurrent, onApplyNew, onDelete, renderThumb }) {
  const [thumbUrl, setThumbUrl] = useState(null);
  useEffect(() => {
    let canceled = false;
    let url = null;
    // Build a pseudo-cover from the template, with placeholder text and no images
    const pseudoCover = {
      ...DEFAULT_COVER,
      ...template,
      title: '主标题示意',
      subtitle: '副标题 · 示例',
      slotImgs: Array(3).fill(null),
    };
    renderThumb(pseudoCover).then(blob => {
      if (canceled) return;
      url = URL.createObjectURL(blob);
      setThumbUrl(url);

    return () => {
      canceled = true;
      if (url) URL.revokeObjectURL(url);

  }, [template, renderThumb]);

  const ar = template.bannerSize.w + '/' + template.bannerSize.h;
  return (
    <div className="tpl-card">
      <div className="tpl-thumb" style={{ aspectRatio: ar }}>
        {thumbUrl ? <img src={thumbUrl} alt={template.name}/>

// ───── NumberField — typeable number input that commits on blur/Enter ─────
// Plain controlled <input type="number"> rejects intermediate values like '' or '1' while
// the user is still typing a 4-digit width. We keep the text in local state and only call
// onChange (with clamp + fallback) when the user blurs or presses Enter.
function NumberField({ value, onChange, min, max, fallback, ...rest }) {
  const [text, setText] = useState(String(value));
  const lastCommittedRef = useRef(value);
  useEffect(() => {
    if (value !== lastCommittedRef.current) {
      lastCommittedRef.current = value;
      setText(String(value));
    }
  }, [value]);
  const commit = () => {
    const n = parseInt(text, 10);
    let safe;
    if (isNaN(n)) safe = fallback ?? value;
    else if (min !== undefined && n < min) safe = min;
    else if (max !== undefined && n > max) safe = max;
    else safe = n;
    lastCommittedRef.current = safe;
    setText(String(safe));
    if (safe !== value) onChange(safe);
  };
  return (
    <input
      {...rest}
      type="number"
      value={text}
      onChange={(e) => setText(e.target.value)}
      onBlur={commit}
      onKeyDown={(e) => {
        if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); }
        if (e.key === 'Escape') { setText(String(value)); e.currentTarget.blur(); }
      }}
    />
  );
}
