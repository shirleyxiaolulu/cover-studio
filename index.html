// ───── Title section ─────
function TitleSection({ state, setState, selected, presetActions }) {
  const value = state.title;
  const layout = state.titleLayout || 'center';
  const count = Array.from(value || '').length;
  const counterColor = count >= TITLE_MAX - 5 ? PRIMARY : 'var(--ink-3)';
  const presets = state.titlePresets || [];
  const activePreset = presets.find(p => p.id === state.activePresetId);
  const isModified = activePreset ? !presetMatches(state, activePreset) : false;
  const noActive = !activePreset; // current style isn't tied to any preset
  const [dragOverId, setDragOverId] = React.useState(null);
  const titleVisible = state.titleVisible !== false; // default true
  return (
    <PropSection id="title" title="标题" selected={selected}
      badge={
        <div className="row" style={{ gap: 10 }}>
          <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, color: counterColor }}>{count}/{TITLE_MAX}</span>
          <button
            className={'cs-switch' + (titleVisible ? ' on' : '')}
            onClick={(e) => { e.stopPropagation(); setState(prev => ({ ...prev, titleVisible: !titleVisible })); }}
            title={titleVisible ? '关闭标题（不在画布上显示）' : '打开标题'}
            aria-label="显示标题"
          />
        </div>
      }
    >
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 8,
        opacity: titleVisible ? 1 : 0.45,
        pointerEvents: titleVisible ? 'auto' : 'none',
        transition: 'opacity .15s',
      }}>
      <textarea
        className="textarea"
        value={value}
        onChange={(e) => setState(prev => ({ ...prev, title: clampTitle(e.target.value) }))}
        placeholder="输入标题（最多 80 字）"
        style={{ minHeight: 90 }}
      />

      <div className="sub-hd row" style={{ justifyContent: 'space-between' }}>
        <span>样式预设</span>
        <div className="row" style={{ gap: 8 }}>
          <button
            onClick={presetActions.exportPresets}
            title="导出预设为 JSON 文件（永久备份）"
            style={{
              background: 'transparent', border: 0, padding: 0,
              cursor: 'pointer', color: 'var(--ink-3)',
              display: 'inline-flex', alignItems: 'center', gap: 3,
              fontSize: 10, textTransform: 'none', letterSpacing: 0, fontWeight: 500,
              fontFamily: 'inherit',
            }}
          >
            <Icon name="download" size={11}/> 导出
          </button>
          <label
            title="从 JSON 文件导入预设"
            style={{
              cursor: 'pointer', color: 'var(--ink-3)',
              display: 'inline-flex', alignItems: 'center', gap: 3,
              fontSize: 10, textTransform: 'none', letterSpacing: 0, fontWeight: 500,
            }}
          >
            <Icon name="upload" size={11}/> 导入
            <input
              type="file" accept="application/json,.json"
              style={{ display: 'none' }}
              onChange={(e) => {
                if (e.target.files && e.target.files[0]) presetActions.importPresets(e.target.files[0]);
                e.target.value = '';
              }}
            />
          </label>
          <span style={{ fontSize: 10, color: 'var(--ink-3)', textTransform: 'none', letterSpacing: 0, fontWeight: 400 }}>
            拖动重排
          </span>
        </div>
      </div>
      <div className="preset-grid">
        {presets.map(p => (
          <button key={p.id}
            className={'preset-card'
              + (state.activePresetId === p.id ? ' active' : '')
              + (dragOverId === p.id ? ' drag-over' : '')}
            draggable
            onDragStart={(e) => {
              e.dataTransfer.effectAllowed = 'move';
              e.dataTransfer.setData('text/preset-id', p.id);
            }}
            onDragOver={(e) => {
              if (Array.from(e.dataTransfer.types).indexOf('text/preset-id') !== -1) {
                e.preventDefault();
                if (dragOverId !== p.id) setDragOverId(p.id);
              }
            }}
            onDragLeave={() => { if (dragOverId === p.id) setDragOverId(null); }}
            onDrop={(e) => {
              e.preventDefault();
              const fromId = e.dataTransfer.getData('text/preset-id');
              setDragOverId(null);
              if (fromId && fromId !== p.id) presetActions.reorderPresets(fromId, p.id);
            }}
            onClick={() => presetActions.applyPreset(p)}
          >
            <div className="demo" style={{
              background: p.color === '#ffffff' ? '#3a3a3a' : '#f4f1ec',
              color: p.color,
              fontFamily: p.font === 'serif' ? 'var(--f-serif)' : p.font === 'display' ? 'var(--f-display)' : 'var(--f-ui)',
              textAlign: p.layout === 'bottom-left' ? 'left' : p.align,
              fontWeight: p.weight,
              paddingLeft: p.layout === 'bottom-left' ? 10 : 6,
              paddingRight: p.layout === 'bottom-left' ? 10 : 6,
            }}>标题</div>
            <div className="lbl">{p.label}</div>
            <button
              className="preset-del"
              onClick={(e) => { e.stopPropagation(); presetActions.deletePreset(p.id); }}
              title="删除预设"
            >
              <Icon name="x" size={9} stroke={2.4}/>
            </button>
          </button>
        ))}
      </div>

      {/* 保存 / 新增 — only show when current style differs from the active preset OR no preset is active */}
      {(isModified || noActive) && (
        <div className="row" style={{ gap: 8 }}>
          {isModified && (
            <button
              className="cs-btn primary"
              style={{
                flex: 1, height: 32, fontSize: 12.5,
                justifyContent: 'center', whiteSpace: 'nowrap',
                padding: '0 8px',
              }}
              onClick={presetActions.savePreset}
              title={`将当前样式保存到「${activePreset?.label}」`}
            >
              保存到当前
            </button>
          )}
          <button
            style={{
              flex: 1, height: 32, fontSize: 12.5,
              background: 'transparent', color: PRIMARY,
              border: `1.5px solid ${PRIMARY}`, borderRadius: 999,
              cursor: 'pointer', whiteSpace: 'nowrap', padding: '0 8px',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 500, fontFamily: 'inherit',
            }}
            onClick={presetActions.addPreset}
            title="把当前样式新增为一个预设"
          >
            新增预设
          </button>
        </div>
      )}

      <div className="sub-hd">排版</div>
      <div className="align-toggle" style={{ width: '100%' }}>
        {[
          { v: 'center', label: '居中 · 多行' },
          { v: 'bottom-left', label: '左下 · 单行' },
        ].map(a => (
          <button key={a.v} style={{ flex: 1 }}
            className={'opt' + (layout === a.v ? ' active' : '')}
            onClick={() => setState(prev => ({ ...prev, titleLayout: a.v }))}
          >{a.label}</button>
        ))}
      </div>
      {layout === 'center' && (
        <div className="align-toggle">
          {[
            { v: 'left', label: '左对齐' },
            { v: 'center', label: '居中' },
            { v: 'right', label: '右对齐' },
          ].map(a => (
            <button key={a.v}
              className={'opt' + (state.titleAlign === a.v ? ' active' : '')}
              onClick={() => setState(prev => ({ ...prev, titleAlign: a.v }))}
            >{a.label}</button>
          ))}
        </div>
      )}

      <SliderRow label="标题副标题间距" value={state.textGap ?? 18} min={0} max={80} unit="px" defaultValue={18}
        onChange={(v) => setState(prev => ({ ...prev, textGap: v }), { skipHistory: true })}/>
      <SliderRow label="左右内边距" value={state.textPadX ?? 55} min={0} max={160} unit="px" defaultValue={55}
        onChange={(v) => setState(prev => ({ ...prev, textPadX: v }), { skipHistory: true })}/>
      {layout === 'bottom-left' && (
        <SliderRow label="底部距离" value={state.textPadBottom ?? 30} min={0} max={120} unit="px" defaultValue={30}
          onChange={(v) => setState(prev => ({ ...prev, textPadBottom: v }), { skipHistory: true })}/>
      )}

      <div className="sub-hd">字体</div>
      <div className="align-toggle" style={{ width: '100%' }}>
        {[
          { v: 'ui', label: 'UI' },
          { v: 'serif', label: '衬线' },
          { v: 'display', label: 'Display' },
        ].map(f => (
          <button key={f.v} style={{ flex: 1 }}
            className={'opt' + (state.titleFont === f.v ? ' active' : '')}
            onClick={() => setState(prev => ({ ...prev, titleFont: f.v }))}
          >{f.label}</button>
        ))}
      </div>

      <div className="sub-hd">字重</div>
      <div className="align-toggle" style={{ width: '100%' }}>
        {[
          { v: 400, label: '常规' },
          { v: 600, label: '半粗' },
          { v: 700, label: '加粗' },
        ].map(a => (
          <button key={a.v} style={{ flex: 1 }}
            className={'opt' + ((state.titleWeight ?? 600) === a.v ? ' active' : '')}
            onClick={() => setState(prev => ({ ...prev, titleWeight: a.v }))}
          >{a.label}</button>
        ))}
      </div>

      <SliderRow label="字号" value={state.titleSize} min={12} max={200} unit="px" defaultValue={40}
        onChange={(v) => setState(prev => ({ ...prev, titleSize: v }), { skipHistory: true })}/>

      <div className="sub-hd">颜色</div>
      <div className="row" style={{ gap: 6, flexWrap: 'wrap' }}>
        {TITLE_COLOR_SWATCHES.map(c => (
          <span key={c}
            onClick={() => setState(prev => ({ ...prev, titleColor: c }))}
            className={'swatch' + (state.titleColor === c ? ' active' : '') + (c === '#ffffff' ? ' light' : '')}
            style={{ background: c }}
            title={c}
          />
        ))}
        <input type="color" value={state.titleColor}
          onChange={(e) => setState(prev => ({ ...prev, titleColor: e.target.value }))}
          style={{ width: 28, height: 28, border: '1px solid var(--line-2)', borderRadius: 6, padding: 0, cursor: 'pointer', background: 'transparent' }}
          title="自定义颜色"
        />
      </div>
      <SliderRow label="透明度" value={state.titleOpacity ?? 100} min={0} max={100} unit="%" defaultValue={100}
        onChange={(v) => setState(prev => ({ ...prev, titleOpacity: v }), { skipHistory: true })}/>
      </div>{/* /title-body wrapper */}
    </PropSection>
  );
}

// ───── Subtitle section ─────
function SubtitleSection({ state, setState, selected }) {
  const subtitleVisible = state.subtitleVisible !== false;
  return (
    <PropSection id="subtitle" title="副标题" selected={selected}
      badge={
        <button
          className={'cs-switch' + (subtitleVisible ? ' on' : '')}
          onClick={(e) => { e.stopPropagation(); setState(prev => ({ ...prev, subtitleVisible: !subtitleVisible })); }}
          title={subtitleVisible ? '关闭副标题（不在画布上显示）' : '打开副标题'}
          aria-label="显示副标题"
        />
      }
    >
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 8,
        opacity: subtitleVisible ? 1 : 0.45,
        pointerEvents: subtitleVisible ? 'auto' : 'none',
        transition: 'opacity .15s',
      }}>
      <textarea
        className="textarea"
        value={state.subtitle}
        onChange={(e) => setState(prev => ({ ...prev, subtitle: e.target.value }))}
        placeholder="作者 · 日期 · 分类"
        style={{ minHeight: 60 }}
      />
      <div className="sub-hd">颜色</div>
      <div className="row" style={{ gap: 6, flexWrap: 'wrap' }}>
        {TITLE_COLOR_SWATCHES.map(c => (
          <span key={c}
            onClick={() => setState(prev => ({ ...prev, subtitleColor: c }))}
            className={'swatch' + ((state.subtitleColor || '#ffffff') === c ? ' active' : '') + (c === '#ffffff' ? ' light' : '')}
            style={{ background: c }}
            title={c}
          />
        ))}
        <input type="color" value={state.subtitleColor || '#ffffff'}
          onChange={(e) => setState(prev => ({ ...prev, subtitleColor: e.target.value }))}
          style={{ width: 28, height: 28, border: '1px solid var(--line-2)', borderRadius: 6, padding: 0, cursor: 'pointer', background: 'transparent' }}
          title="自定义颜色"
        />
      </div>
      <SliderRow label="透明度" value={state.subtitleOpacity ?? 85} min={0} max={100} unit="%" defaultValue={85}
        onChange={(v) => setState(prev => ({ ...prev, subtitleOpacity: v }), { skipHistory: true })}/>
      </div>{/* /subtitle-body wrapper */}
    </PropSection>
  );
}

// ───── Single slot section ─────
function SlotSection({ idx, state, setState, selected }) {
  const slot = state.slotImgs[idx];
  const id = `slot-${idx}`;
  return (
    <PropSection
      id={id}
      title={`Slot ${idx + 1}`}
      selected={selected}
      badge={
        <span style={{
          fontSize: 10,
          color: slot ? 'var(--moss)' : 'var(--ink-3)',
          fontFamily: 'var(--f-mono)',
        }}>{slot ? '已填' : '空'}</span>
      }
    >
      {slot ? (
        <>
          <div style={{ position: 'relative' }}>
            <img src={slot.src} alt={slot.name}
              style={{ width: '100%', borderRadius: 8, objectFit: 'cover', maxHeight: 100, display: 'block' }}/>
            <div style={{
              position: 'absolute', left: 6, bottom: 6, right: 6,
              fontSize: 10, color: 'rgba(255,255,255,.9)',
              background: 'rgba(0,0,0,.5)', padding: '3px 6px', borderRadius: 4,
              fontFamily: 'var(--f-mono)',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{slot.name}</div>
          </div>
          <SliderRow label="缩放" value={Math.round((slot.scale || 1) * 100)} min={50} max={300} unit="%" defaultValue={100}
            onChange={(v) => {
              const ns = [...state.slotImgs];
              ns[idx] = { ...ns[idx], scale: v / 100 };
              setState(prev => ({ ...prev, slotImgs: ns }), { skipHistory: true });
            }}/>
          <SliderRow label="横向位置" value={clampPos(slot.x)} min={-50} max={50} unit="" defaultValue={0}
            onChange={(v) => {
              const ns = [...state.slotImgs];
              ns[idx] = { ...ns[idx], x: v };
              setState(prev => ({ ...prev, slotImgs: ns }), { skipHistory: true });
            }}/>
          <SliderRow label="纵向位置" value={clampPos(slot.y)} min={-50} max={50} unit="" defaultValue={0}
            onChange={(v) => {
              const ns = [...state.slotImgs];
              ns[idx] = { ...ns[idx], y: v };
              setState(prev => ({ ...prev, slotImgs: ns }), { skipHistory: true });
            }}/>
          <div className="row" style={{ gap: 6 }}>
            <button className="cs-btn ghost" style={{ flex: 1, justifyContent: 'center' }}
              onClick={() => {
                const ns = [...state.slotImgs];
                ns[idx] = { ...ns[idx], scale: 1, x: 0, y: 0 };
                setState(prev => ({ ...prev, slotImgs: ns }));
              }}>
              <Icon name="undo" size={12}/> 复位
            </button>
            <button className="cs-btn ghost" style={{ flex: 1, justifyContent: 'center' }}
              onClick={() => {
                const ns = [...state.slotImgs];
                ns[idx] = null;
                setState(prev => ({ ...prev, slotImgs: ns }));
              }}>
              <Icon name="trash" size={12}/> 清空
            </button>
          </div>
        </>
      ) : (
        <div style={{ fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.6 }}>
          这个 slot 还是空的。<br/>
          在左侧「图片」面板上传，或点图库里的图填进来。
        </div>
      )}
    </PropSection>
  );
}

// ───── Selection props — one flat scrollable page (no tabs / no pills) ─────
function SelectionProps({ state, setState, selected, presetActions }) {
  // when selection changes, scroll the matching section into view + highlight it
  useEffect(() => {
    if (!selected) return;
    const el = document.getElementById(`section-${selected}`);
    if (el && typeof el.scrollIntoView === 'function') {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, [selected]);

  return (
    <div className="cs-panel-body col" style={{ gap: 10, padding: '12px 14px 24px' }}>
      <TitleSection state={state} setState={setState} selected={selected} presetActions={presetActions}/>
      <SubtitleSection state={state} setState={setState} selected={selected}/>
      {Array.from({ length: state.collageCount }, (_, i) => (
        <SlotSection key={i} idx={i} state={state} setState={setState} selected={selected}/>
      ))}
    </div>
  );
}

// ───── slider row helper ─────
function SliderRow({ label, value, min, max, unit, onChange, defaultValue }) {
  const hasReset = defaultValue !== undefined;
  const isModified = hasReset && value !== defaultValue;
  return (
    <div className="col" style={{ gap: 4 }}>
      <div className="row" style={{ justifyContent: 'space-between' }}>
        <span style={{ fontSize: 11, color: 'var(--ink-2)' }}>{label}</span>
        <div className="row" style={{ gap: 6 }}>
          <span style={{ fontSize: 11, fontFamily: 'var(--f-mono)', color: 'var(--ink-3)' }}>{value}{unit}</span>
          {hasReset && (
            <button
              className="reset-btn"
              style={{ visibility: isModified ? 'visible' : 'hidden' }}
              onClick={() => onChange(defaultValue)}
              title="复位"
            >
              <Icon name="undo" size={11}/>
            </button>
          )}
        </div>
      </div>
      <div className="slider-wrap">
        <div className="slider-fill" style={{ width: `${((value - min) / (max - min)) * 100}%` }}></div>
        <input
          className="slider-input"
          type="range" min={min} max={max} value={value}
          onChange={(e) => onChange(+e.target.value)}
        />
      </div>
    </div>
  );
}

// ───── Banner canvas ─────
function Banner({ state, activeSlot, setActiveSlot, updateSlot, setTitle, setSubtitle, setSelectedLayer, onDropFromLibrary, covers, activeCoverIdx, canvasActions }) {
  // ── responsive preview sizing: watch viewport width to fit the canvas inside the
  //    available stage area (= viewport - rail - 2 side panels - padding).
  const realW = state.bannerSize.w;
  const realH = state.bannerSize.h;
  const [viewportW, setViewportW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1440);
  const [viewportH, setViewportH] = useState(typeof window !== 'undefined' ? window.innerHeight : 900);
  useEffect(() => {
    const onResize = () => {
      setViewportW(window.innerWidth);
      setViewportH(window.innerHeight);
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  // Estimate side panels + rail from viewport width (matches the responsive grid in CSS)
  const railW = viewportW <= 1120 ? 48 : (viewportW <= 1280 ? 52 : 56);
  const panelW = viewportW <= 1120 ? 220 : (viewportW <= 1280 ? 240 : 280);
  const stageW = Math.max(320, viewportW - railW - panelW * 2 - 80); // 80px padding budget
  const stageH = Math.max(240, viewportH - 52 - 44 - 180); // topbar + stage toolbar + canvas tabs/hint
  const MAX_PREVIEW_W = Math.min(1100, stageW);
  const MAX_PREVIEW_H = Math.min(620, stageH);
  const realRatio = realW / realH;
  const maxRatio = MAX_PREVIEW_W / MAX_PREVIEW_H;
  let previewW, previewH;
  if (realRatio >= maxRatio) {
    previewW = Math.min(realW, MAX_PREVIEW_W);
    previewH = previewW / realRatio;
  } else {
    previewH = Math.min(realH, MAX_PREVIEW_H);
    previewW = previewH * realRatio;
  }
  const previewScale = previewW / realW;
  const collage = state.collageCount;
  const overlayStrength = (state.overlay ?? 42) / 100;
  const titleFont = state.titleFont === 'serif' ? 'var(--f-serif)'
    : state.titleFont === 'display' ? 'var(--f-display)'
    : 'var(--f-ui)';
  const titleRef = useRef(null);
  const subtitleRef = useRef(null);
  const [draggingSlot, setDraggingSlot] = useState(null);
  const [dragStart, setDragStart] = useState(null);

  // initialize editable text
  useEffect(() => {
    if (titleRef.current && titleRef.current.textContent !== state.title) {
      titleRef.current.textContent = state.title || '';
    }
  }, [state.title]);
  useEffect(() => {
    if (subtitleRef.current && subtitleRef.current.textContent !== state.subtitle) {
      subtitleRef.current.textContent = state.subtitle || '';
    }
  }, [state.subtitle]);

  // slot drag for repositioning — convert pixel delta to object-position % delta
  const onSlotMouseDown = (idx, e) => {
    if (!state.slotImgs[idx]) return;
    e.preventDefault();
    setDraggingSlot(idx);
    setDragStart({
      mouseX: e.clientX,
      mouseY: e.clientY,
      origX: clampPos(state.slotImgs[idx].x),
      origY: clampPos(state.slotImgs[idx].y),
    });
  };
  useEffect(() => {
    if (draggingSlot == null) return;
    const onMove = (e) => {
      const dx = e.clientX - dragStart.mouseX;
      const dy = e.clientY - dragStart.mouseY;
      // ~200px drag spans the full range; dragging right reveals the LEFT of the image
      const sensitivity = 0.25;
      const newX = clampPos(dragStart.origX - dx * sensitivity);
      const newY = clampPos(dragStart.origY - dy * sensitivity);
      updateSlot(draggingSlot, { x: newX, y: newY });
    };
    const onUp = () => { setDraggingSlot(null); setDragStart(null); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [draggingSlot, dragStart, updateSlot]);

  return (
    <div className="canvas-wrap">
      <div className="canvas-readout">
        文章 Banner · {state.bannerSize.w} × {state.bannerSize.h} · {collage} 张拼图 · slot {state.slotImgs.slice(0, collage).filter(Boolean).length}/{collage} 已上传
      </div>

      {/* canvas-clip = the on-screen footprint; canvas-frame inside = real banner pixels */}
      <div className="canvas-clip" style={{
        width: previewW, height: previewH,
        borderRadius: Math.max(0, (state.radius || 0) * previewScale),
      }}>
      <div className="canvas-frame"
        style={{
          width: realW, height: realH,
          borderRadius: state.radius || 0,
          transform: `scale(${previewScale})`,
          transformOrigin: '0 0',
        }}
      >
        {/* slots */}
        <div className="slot-row" style={{ gridTemplateColumns: `repeat(${collage}, 1fr)` }}>
          {Array.from({ length: collage }, (_, i) => (
            <SlotView
              key={i}
              i={i}
              slot={state.slotImgs[i]}
              opacity={state.imageOpacity}
              primary={PRIMARY}
              active={activeSlot === i}
              dragging={draggingSlot === i}
              onActivate={() => { setActiveSlot(i); setSelectedLayer(`slot-${i}`); }}
              onMouseDown={(e) => onSlotMouseDown(i, e)}
              onDropSrc={(src) => onDropFromLibrary(i, src)}
            />
          ))}
        </div>

        {/* dividers */}
        {collage > 1 && Array.from({ length: collage - 1 }, (_, i) => (
          <div key={i} className="slot-divider" style={{ left: `${((i+1)/collage)*100}%` }}/>
        ))}

        {/* dark overlay */}
        <div className="overlay" style={{
          background: `linear-gradient(180deg, rgba(0,0,0,${overlayStrength*0.55}) 0%, rgba(0,0,0,${overlayStrength*0.7}) 60%, rgba(0,0,0,${overlayStrength*0.85}) 100%)`,
        }}></div>

        {/* text block — layout-aware */}
        {(() => {
          const layout = state.titleLayout || 'center';
          // textAlign only applies in center layout; bottom-left is fixed left-aligned
          const textAlignStyle = layout === 'center' ? { textAlign: state.titleAlign || 'center' } : {};
          const gap = state.textGap ?? 18;
          const padX = state.textPadX ?? 55;
          const padBottom = state.textPadBottom ?? 30;
          const blockStyle = {
            padding: `0 ${padX}px`,
            gap: `${gap}px`,
            ...(layout === 'bottom-left' ? { bottom: `${padBottom}px` } : {}),
          };
          const showTitle = state.titleVisible !== false;
          return (
            <div className={'text-block ' + layout} style={blockStyle}>
              {showTitle && <div
                ref={titleRef}
                className="title-edit"
                contentEditable
                suppressContentEditableWarning
                spellCheck={false}
                onClick={() => setSelectedLayer('title')}
                onInput={(e) => {
                  const txt = e.currentTarget.textContent || '';
                  if (Array.from(txt).length > TITLE_MAX) {
                    const trimmed = clampTitle(txt);
                    e.currentTarget.textContent = trimmed;
                    const range = document.createRange();
                    range.selectNodeContents(e.currentTarget);
                    range.collapse(false);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                  }
                }}
                onBlur={(e) => setTitle(e.currentTarget.textContent)}
                onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); e.currentTarget.blur(); } }}
                style={{
                  fontFamily: titleFont,
                  fontSize: state.titleSize,
                  color: state.titleColor,
                  fontWeight: state.titleWeight ?? 600,
                  opacity: (state.titleOpacity ?? 100) / 100,
                  ...textAlignStyle,
                }}
              />}
              {state.subtitleVisible !== false && <div
                ref={subtitleRef}
                className="subtitle-edit"
                contentEditable
                suppressContentEditableWarning
                spellCheck={false}
                onClick={() => setSelectedLayer('subtitle')}
                onBlur={(e) => setSubtitle(e.currentTarget.textContent)}
                onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
                style={{
                  fontFamily: titleFont,
                  color: state.subtitleColor || '#ffffff',
                  opacity: (state.subtitleOpacity ?? 85) / 100,
                  ...textAlignStyle,
                }}
              />}
            </div>
          );
        })()}
      </div>
      </div>{/* /canvas-clip */}

      {/* canvas tabs — switch, add, delete, duplicate */}
      {covers && (
        <div className="canvas-tabs">
          {covers.map((c, i) => (
            <div key={c.id || i}
              className={'canvas-tab' + (i === activeCoverIdx ? ' active' : '')}
              onClick={() => canvasActions.switchCanvas(i)}
              title={c.filename || ('画布 ' + (i + 1))}
            >
              <span className="canvas-tab-idx">{i + 1}</span>
              <span className="canvas-tab-name">{c.filename || `画布 ${i + 1}`}</span>
              <button
                className="canvas-tab-act"
                title="复制画布"
                onClick={(e) => { e.stopPropagation(); canvasActions.duplicateCanvas(i); }}
              >⎘</button>
              {covers.length > 1 && (
                <button
                  className="canvas-tab-act danger"
                  title="删除画布"
                  onClick={(e) => {
                    e.stopPropagation();
                    if (confirm(`删除「${c.filename || '画布 ' + (i+1)}」？`)) canvasActions.deleteCanvas(i);
                  }}
                ><Icon name="x" size={10} stroke={2.5}/></button>
              )}
            </div>
          ))}
          <button
            className="canvas-tab add"
            onClick={canvasActions.addCanvas}
            disabled={covers.length >= CANVAS_MAX}
            title={covers.length >= CANVAS_MAX ? `已达 ${CANVAS_MAX} 张上限` : '新增一张空白画布'}
          >
            <Icon name="plus" size={12} stroke={2}/> 添加画布 · {covers.length}/{CANVAS_MAX}
          </button>
        </div>
      )}

      <div style={{ marginTop: 12, fontSize: 11, color: 'var(--ink-3)', textAlign: 'center', lineHeight: 1.6 }}>
        点击文字直接编辑 · 拖动图片调位 · 预览按 {Math.round(previewScale * 100)}% 缩放
      </div>
    </div>
  );
}

// ───── SlotView ─────
// Pure preview surface. Click to select. Drop a library image to fill/replace.
function SlotView({ i, slot, opacity, primary, active, dragging, onActivate, onMouseDown, onDropSrc }) {
  const [over, setOver] = useState(false);

  // Accept drag from library only (we set a custom mimetype on dragstart)
  const dragHandlers = {
    onDragOver: (e) => {
      const types = e.dataTransfer.types || [];
      if (Array.from(types).indexOf('text/cover-image-src') !== -1) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        if (!over) setOver(true);
      }
    },
    onDragLeave: () => setOver(false),
    onDrop: (e) => {
      e.preventDefault();
      const src = e.dataTransfer.getData('text/cover-image-src');
      setOver(false);
      if (src && onDropSrc) onDropSrc(src);
    },
  };

  const dropOutline = over ? `3px dashed ${primary}` : (active ? `2px solid ${primary}` : 'none');

  if (!slot) {
    return (
      <div
        {...dragHandlers}
        className={'slot empty' + (over ? ' drop-over' : '')}
        onClick={onActivate}
        style={{ cursor: 'pointer', outline: dropOutline, outlineOffset: -2 }}
      >
        <div style={{
          color: 'rgba(255,255,255,.5)',
          fontFamily: 'var(--f-mono)',
          fontSize: 11,
          letterSpacing: '.1em',
          textAlign: 'center', lineHeight: 1.6,
        }}>
          {over ? '松开放置' : <>SLOT {String(i + 1).padStart(2, '0')}</>}
        </div>
      </div>
    );
  }

  return (
    <div
      {...dragHandlers}
      className={'slot' + (over ? ' drop-over' : '')}
      onClick={onActivate}
      style={{ outline: dropOutline, outlineOffset: -2 }}
    >
      <img
        src={slot.src}
        alt={slot.name}
        style={{
          opacity: opacity / 100,
          // slot.x / slot.y are now in [-50, +50] — converted to object-position %
          objectPosition: `${50 + clampPos(slot.x)}% ${50 + clampPos(slot.y)}%`,
          transform: `scale(${slot.scale || 1})`,
          transformOrigin: 'center center',
          cursor: dragging ? 'grabbing' : 'grab',
        }}
      />
      <div className="slot-drag-handle" onMouseDown={onMouseDown}></div>
      {over && (
        <div style={{
          position: 'absolute', inset: 0,
          background: 'rgba(255,84,54,.15)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: '#fff', fontSize: 12, fontWeight: 600,
          pointerEvents: 'none',
        }}>
          替换 Slot {i + 1}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
